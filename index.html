<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS BUS - Carte & Directions</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #fff; font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #controls { background: #222; padding: 6px; display: flex; gap: 6px; z-index: 1000; }
        .btn { flex: 1; padding: 10px; font-weight: bold; text-align: center; border-radius: 6px; border: none; cursor: pointer; color: #fff; text-transform: uppercase; font-size: 0.8rem; }
        #btn-file { background: #f1c40f; color: #000; }
        #btn-toggle { background: #2ecc71; }

        #dashboard {
            background: #fff; border-bottom: 2px solid #333;
            display: grid; grid-template-columns: 1fr 1fr; padding: 6px; text-align: center; align-items: center;
        }
        .val { font-size: 2rem; font-weight: bold; color: #000; line-height: 1; }
        #arrow { font-size: 2.8rem; color: #3498db; }
        .label { font-size: 0.7rem; color: #666; font-weight: bold; }

        /* Important : la carte doit avoir une taille définie */
        #map { flex: 1; width: 100%; height: 100%; background: #ddd; }
        
        input[type="file"] { display: none; }
        .user-dot { width: 14px; height: 14px; background: #248aff; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 8px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="controls">
        <label class="btn" id="btn-file">📂 GPX<input type="file" id="gpxInput" accept=".gpx"></label>
        <button class="btn" id="btn-toggle">🚀 ACTIVER</button>
    </div>

    <div id="dashboard">
        <div><span id="speed" class="val">0</span><br><span class="label">KM/H</span></div>
        <div><span id="arrow">🧭</span><br><span id="instruction" class="label" style="color:#3498db;">DIRECTION</span></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Initialisation forcée de la carte
        const map = L.map('map', { zoomControl: false }).setView([50.85, 4.35], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OSM'
        }).addTo(map);

        const speedDiv = document.getElementById('speed');
        const arrowDiv = document.getElementById('arrow');
        const instrDiv = document.getElementById('instruction');
        const btnToggle = document.getElementById('btn-toggle');
        
        let tracePoints = [];
        let traceLayer = null;
        let watchId = null;

        const icon = L.divIcon({ className: 'user-dot', iconSize: [18, 18], iconAnchor: [9, 9] });
        let userMarker = L.marker([0,0], {icon: icon}).addTo(map);

        function getBearing(p1, p2) {
            const lat1 = p1[0] * Math.PI / 180, lat2 = p2[0] * Math.PI / 180;
            const lon1 = p1[1] * Math.PI / 180, lon2 = p2[1] * Math.PI / 180;
            const y = Math.sin(lon2 - lon1) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon2 - lon1);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        // Chargement GPX
        document.getElementById('gpxInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const parser = new DOMParser();
                const xml = parser.parseFromString(event.target.result, "text/xml");
                const pts = xml.querySelectorAll('trkpt');
                tracePoints = Array.from(pts).map(pt => [parseFloat(pt.getAttribute('lat')), parseFloat(pt.getAttribute('lon'))]);
                
                if (tracePoints.length > 0) {
                    if (traceLayer) map.removeLayer(traceLayer);
                    traceLayer = L.polyline(tracePoints, {color: '#007bff', weight: 5}).addTo(map);
                    map.fitBounds(traceLayer.getBounds());
                    instrDiv.innerText = "TRAJET CHARGÉ";
                }
            };
            reader.readAsText(e.target.files[0]);
        };

        // On/Off
        btnToggle.onclick = function() {
            if (watchId === null) {
                watchId = navigator.geolocation.watchPosition(updateGPS, (err) => alert(err.message), { 
                    enableHighAccuracy: true, 
                    maximumAge: 0 
                });
                btnToggle.innerText = "🛑 COUPER";
                btnToggle.style.background = "#e74c3c";
            } else {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                btnToggle.innerText = "🚀 ACTIVER";
                btnToggle.style.background = "#2ecc71";
                speedDiv.innerText = "0";
            }
        };

        function updateGPS(pos) {
            const ici = [pos.coords.latitude, pos.coords.longitude];
            const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
            
            speedDiv.innerText = speed;
            userMarker.setLatLng(ici);

            // Zoom auto
            let z = speed > 40 ? 15 : (speed < 10 ? 18 : 16);
            map.setView(ici, z, { animate: true });

            // Logic Direction
            if (tracePoints.length > 10) {
                let minD = Infinity, idx = 0;
                for (let i = 0; i < tracePoints.length; i++) {
                    let d = L.latLng(ici).distanceTo(tracePoints[i]);
                    if (d < minD) { minD = d; idx = i; }
                }

                if (speed < 3) {
                    arrowDiv.innerText = "🛑"; instrDiv.innerText = "ARRÊT";
                } else {
                    let p1 = tracePoints[idx];
                    let p2 = tracePoints[Math.min(idx + 5, tracePoints.length - 1)];
                    let p3 = tracePoints[Math.min(idx + 12, tracePoints.length - 1)];
                    
                    let b1 = getBearing(p1, p2);
                    let b2 = getBearing(p2, p3);
                    let diff = b2 - b1;
                    if (diff > 180) diff -= 360;
                    if (diff < -180) diff += 360;

                    if (diff > 18) { arrowDiv.innerText = "➜"; instrDiv.innerText = "DROITE"; }
                    else if (diff < -18) { arrowDiv.innerText = "⬅"; instrDiv.innerText = "GAUCHE"; }
                    else { arrowDiv.innerText = "⬆"; instrDiv.innerText = "DROIT"; }
                }
            }
        }
    </script>
</body>
</html>
