<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS BUS - FIX BOUTONS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background: #fff; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Barre de contrôle optimisée */
        #controls { 
            background: #222; 
            padding: 8px 4px; 
            display: flex; 
            justify-content: space-between;
            gap: 4px; 
            z-index: 1001; 
            flex-shrink: 0; 
        }
        
        .btn { 
            flex: 1; 
            padding: 12px 2px; 
            font-weight: bold; 
            text-align: center; 
            border-radius: 6px; 
            border: none; 
            cursor: pointer; 
            color: #fff; 
            text-transform: uppercase; 
            font-size: 0.65rem; /* Taille réduite pour garantir l'affichage */
            white-space: nowrap;
        }

        #btn-file { background: #f1c40f; color: #000; }
        #btn-toggle { background: #2ecc71; }
        #btn-refresh { background: #3498db; }
        
        #dashboard { background: #fff; border-bottom: 2px solid #333; display: grid; grid-template-columns: 1fr 1fr; padding: 8px; text-align: center; align-items: center; z-index: 1001; flex-shrink: 0; }
        .val { font-size: 2.2rem; font-weight: bold; color: #000; line-height: 1; }
        #arrow { font-size: 2.8rem; color: #3498db; }
        .label { font-size: 0.75rem; color: #666; font-weight: bold; text-transform: uppercase; }
        
        #map { flex-grow: 1; width: 100%; background: #e0e0e0; z-index: 1; }
        
        input[type="file"] { display: none; }
        .user-dot { width: 16px; height: 16px; background: #248aff; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="controls">
        <label class="btn" id="btn-file">📂 GPX<input type="file" id="gpxInput" accept=".gpx"></label>
        <button class="btn" id="btn-toggle">🚀 ACTIVER</button>
        <button class="btn" id="btn-refresh">📍 RECENTRER</button>
    </div>

    <div id="dashboard">
        <div><span id="speed" class="val">0</span><br><span class="label">KM/H</span></div>
        <div><span id="arrow">🧭</span><br><span id="instruction" class="label" style="color:#3498db;">PRÊT</span></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([50.85, 4.35], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Force le redimensionnement pour éviter les bugs d'affichage
        setTimeout(() => { map.invalidateSize(); }, 500);

        const speedDiv = document.getElementById('speed');
        const arrowDiv = document.getElementById('arrow');
        const instrDiv = document.getElementById('instruction');
        const btnToggle = document.getElementById('btn-toggle');
        const btnRefresh = document.getElementById('btn-refresh');
        
        let tracePoints = [];
        let watchId = null;
        let userMarker = null;
        let accuracyCircle = null;
        let currentPos = null;

        function getBearing(p1, p2) {
            const lat1 = p1[0] * Math.PI / 180, lat2 = p2[0] * Math.PI / 180;
            const lon1 = p1[1] * Math.PI / 180, lon2 = p2[1] * Math.PI / 180;
            const y = Math.sin(lon2 - lon1) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon2 - lon1);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        document.getElementById('gpxInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const parser = new DOMParser();
                const xml = parser.parseFromString(event.target.result, "text/xml");
                tracePoints = Array.from(xml.querySelectorAll('trkpt')).map(pt => [parseFloat(pt.getAttribute('lat')), parseFloat(pt.getAttribute('lon'))]);
                if (tracePoints.length > 0) {
                    L.polyline(tracePoints, {color: '#007bff', weight: 5}).addTo(map);
                    map.fitBounds(L.polyline(tracePoints).getBounds());
                    instrDiv.innerText = "TRAJET OK";
                }
            };
            reader.readAsText(e.target.files[0]);
        };

        // Fonction Recentrer
        btnRefresh.onclick = function() {
            if (currentPos) {
                map.setView(currentPos, map.getZoom(), { animate: true });
            } else {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const ici = [pos.coords.latitude, pos.coords.longitude];
                    map.setView(ici, 17, { animate: true });
                });
            }
        };

        btnToggle.onclick = function() {
            if (watchId === null) {
                watchId = navigator.geolocation.watchPosition(updateGPS, null, { enableHighAccuracy: true, maximumAge: 0 });
                btnToggle.innerText = "🛑 STOP";
                btnToggle.style.background = "#e74c3c";
            } else {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                if (userMarker) map.removeLayer(userMarker);
                if (accuracyCircle) map.removeLayer(accuracyCircle);
                userMarker = null; accuracyCircle = null;
                btnToggle.innerText = "🚀 ACTIVER";
                btnToggle.style.background = "#2ecc71";
            }
        };

        function updateGPS(pos) {
            const ici = [pos.coords.latitude, pos.coords.longitude];
            currentPos = ici;
            const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
            const precision = pos.coords.accuracy;

            if (!userMarker) {
                const icon = L.divIcon({ className: 'user-dot', iconSize: [16, 16], iconAnchor: [8, 8] });
                userMarker = L.marker(ici, {icon: icon}).addTo(map);
                accuracyCircle = L.circle(ici, { radius: precision, weight: 1, color: '#248aff', fillOpacity: 0.1 }).addTo(map);
            } else {
                userMarker.setLatLng(ici);
                accuracyCircle.setLatLng(ici).setRadius(precision);
            }

            speedDiv.innerText = speed;
            map.panTo(ici, { animate: true, duration: 0.5 });

            let z = speed < 12 ? 18 : (speed > 50 ? 14 : 16);
            if (map.getZoom() !== z) map.setZoom(z);

            if (tracePoints.length > 5) {
                let minD = Infinity, idx = 0;
                for (let i = 0; i < tracePoints.length; i++) {
                    let d = L.latLng(ici).distanceTo(tracePoints[i]);
                    if (d < minD) { minD = d; idx = i; }
                }

                if (minD > 50) {
                    arrowDiv.innerText = "⚠️";
                    instrDiv.innerText = "HORS TRAJET";
                } else if (speed < 4) {
                    arrowDiv.innerText = "🛑";
                    instrDiv.innerText = "ARRÊT";
                } else {
                    let b1 = getBearing(tracePoints[idx], tracePoints[Math.min(idx + 6, tracePoints.length - 1)]);
                    let b2 = getBearing(tracePoints[Math.min(idx + 6, tracePoints.length - 1)], tracePoints[Math.min(idx + 15, tracePoints.length - 1)]);
                    let diff = b2 - b1;
                    if (diff > 180) diff -= 360; if (diff < -180) diff += 360;

                    if (diff > 18) { arrowDiv.innerText = "➜"; instrDiv.innerText = "DROITE"; }
                    else if (diff < -18) { arrowDiv.innerText = "⬅"; instrDiv.innerText = "GAUCHE"; }
                    else { arrowDiv.innerText = "⬆"; instrDiv.innerText = "DROIT"; }
                }
            }
        }
    </script>
</body>
</html>
