<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS BUS - FIX ERREUR</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #fff; font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #controls { background: #222; padding: 10px; z-index: 1000; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn { padding: 15px 0; font-size: 0.85rem; font-weight: bold; text-align: center; border-radius: 8px; border: none; cursor: pointer; color: #fff; text-transform: uppercase; }
        #btn-file { background: #f1c40f; color: #000; }
        #btn-gps { background: #2ecc71; }
        #btn-stop { background: #e74c3c; }
        #dashboard { background: #fff; border-bottom: 3px solid #333; display: grid; grid-template-columns: 1fr 1.5fr 1fr; padding: 10px; text-align: center; }
        .val { font-size: 2rem; font-weight: bold; color: #000; display: block; }
        #arrow { font-size: 3rem; color: #3498db; }
        .label { font-size: 0.7rem; color: #666; font-weight: bold; }
        #map { flex: 1; width: 100%; }
        input[type="file"] { display: none; }
        .user-icon { width: 30px; height: 30px; background: #248aff; border: 3px solid white; border-radius: 50% 50% 0 50%; transform: rotate(45deg); box-shadow: 0 0 15px rgba(36, 138, 255, 0.6); }
    </style>
</head>
<body>

    <div id="controls">
        <label class="btn" id="btn-file">📂 GPX<input type="file" id="gpxInput" accept=".gpx"></label>
        <button class="btn" id="btn-gps">🚀 START</button>
        <button class="btn" id="btn-stop">🛑 STOP</button>
    </div>

    <div id="dashboard">
        <div><span id="speed" class="val">0</span><span class="label">KM/H</span></div>
        <div><span id="arrow">🧭</span><span id="instruction" class="label" style="display:block; font-size:0.8rem; color:#3498db;">PRÊT</span></div>
        <div><span id="status" class="val" style="font-size: 1rem; color: #e67e22;">OFF</span><span class="label">SIGNAL</span></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([50.85, 4.35], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const speedDiv = document.getElementById('speed');
        const statusDiv = document.getElementById('status');
        const arrowDiv = document.getElementById('arrow');
        const instrDiv = document.getElementById('instruction');
        
        let tracePoints = [];
        let traceLayer;
        let watchId = null;

        const icon = L.divIcon({ className: 'user-icon-container', html: '<div id="user-dot" class="user-icon"></div>', iconSize: [30, 30], iconAnchor: [15, 15] });
        let userMarker = L.marker([0,0], {icon: icon}).addTo(map);

        document.getElementById('gpxInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const parser = new DOMParser();
                const xml = parser.parseFromString(event.target.result, "text/xml");
                tracePoints = Array.from(xml.querySelectorAll('trkpt')).map(pt => [parseFloat(pt.getAttribute('lat')), parseFloat(pt.getAttribute('lon'))]);
                if (tracePoints.length > 0) {
                    if (traceLayer) map.removeLayer(traceLayer);
                    traceLayer = L.polyline(tracePoints, {color: '#007bff', weight: 6, opacity: 0.6}).addTo(map);
                    map.fitBounds(traceLayer.getBounds());
                    instrDiv.innerText = "GPX OK";
                }
            };
            reader.readAsText(e.target.files[0]);
        };

        document.getElementById('btn-gps').onclick = function() {
            if (!navigator.geolocation) {
                alert("Ton navigateur ne supporte pas le GPS.");
                return;
            }

            statusDiv.innerText = "RECH...";
            statusDiv.style.color = "#f1c40f";

            watchId = navigator.geolocation.watchPosition(function(pos) {
                statusDiv.innerText = "FIX";
                statusDiv.style.color = "#2ecc71";
                const ici = [pos.coords.latitude, pos.coords.longitude];
                speedDiv.innerText = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
                userMarker.setLatLng(ici);
                map.panTo(ici);
            }, function(err) {
                statusDiv.style.color = "#e74c3c";
                if (err.code === 1) statusDiv.innerText = "REFUSÉ";
                else if (err.code === 2) statusDiv.innerText = "NON DISPO";
                else if (err.code === 3) statusDiv.innerText = "TIMEOUT";
                else statusDiv.innerText = "ERREUR";
                
                alert("Erreur GPS (" + err.code + "): " + err.message + "\n\nAssure-toi d'être sur un site en HTTPS et d'avoir autorisé la position.");
            }, { 
                enableHighAccuracy: true, 
                maximumAge: 0,
                timeout: 15000 
            });
        };

        document.getElementById('btn-stop').onclick = function() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                statusDiv.innerText = "OFF";
            }
        };
    </script>
</body>
</html>
