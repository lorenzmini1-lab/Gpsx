<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS BUS - NAVIGATION FINALE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #fff; font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        #controls { background: #222; padding: 10px; z-index: 1000; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 15px 0; font-size: 1rem; font-weight: bold; text-align: center; border-radius: 10px; border: none; cursor: pointer; color: #fff; }
        #btn-file { background: #f1c40f; color: #000; }
        #btn-gps { background: #2ecc71; }

        #dashboard {
            background: #fff; border-bottom: 3px solid #333;
            display: grid; grid-template-columns: 1fr 1.5fr 1fr;
            padding: 10px; text-align: center; align-items: center;
        }
        .val { font-size: 2.2rem; font-weight: bold; color: #000; display: block; line-height: 1; }
        #arrow { font-size: 3.5rem; color: #3498db; }
        .label { font-size: 0.7rem; color: #666; font-weight: bold; text-transform: uppercase; }

        #map { flex: 1; width: 100%; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="controls">
        <label class="btn" id="btn-file"> CHARGER GPX<input type="file" id="gpxInput" accept=".gpx"></label>
        <button class="btn" id="btn-gps"> START GPS</button>
    </div>

    <div id="dashboard">
        <div>
            <span id="speed" class="val">0</span>
            <span class="label">KM/H</span>
        </div>
        <div>
            <span id="arrow"></span>
            <span id="instruction" class="label" style="display:block; font-size:0.9rem; color:#3498db;">PRĘT</span>
        </div>
        <div>
            <span id="status" class="val" style="font-size: 1.2rem; color: #e67e22;">OFF</span>
            <span class="label">GPS</span>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([50.79, 4.41], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const speedDiv = document.getElementById('speed');
        const statusDiv = document.getElementById('status');
        const arrowDiv = document.getElementById('arrow');
        const instrDiv = document.getElementById('instruction');
        
        let tracePoints = [];
        let traceLayer;
        let userMarker = L.circleMarker([0,0], {radius: 10, color: 'red', fillColor: 'white', fillOpacity: 1, weight: 3}).addTo(map);

        // Calcul de l'angle entre deux points
        function getBearing(p1, p2) {
            const lat1 = p1[0] * Math.PI / 180;
            const lat2 = p2[0] * Math.PI / 180;
            const lon1 = p1[1] * Math.PI / 180;
            const lon2 = p2[1] * Math.PI / 180;
            const y = Math.sin(lon2 - lon1) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon2 - lon1);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        document.getElementById('gpxInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const parser = new DOMParser();
                const xml = parser.parseFromString(event.target.result, "text/xml");
                tracePoints = Array.from(xml.querySelectorAll('trkpt')).map(pt => [
                    parseFloat(pt.getAttribute('lat')),
                    parseFloat(pt.getAttribute('lon'))
                ]);

                if (tracePoints.length > 0) {
                    if (traceLayer) map.removeLayer(traceLayer);
                    traceLayer = L.polyline(tracePoints, {color: 'blue', weight: 5}).addTo(map);
                    map.fitBounds(traceLayer.getBounds());
                    instrDiv.innerText = "TRAJET OK";
                    document.getElementById('btn-file').innerText = " GPX OK";
                }
            };
            reader.readAsText(e.target.files[0]);
        };

        document.getElementById('btn-gps').onclick = function() {
            if (tracePoints.length === 0) { alert("Charge le fichier d'abord !"); return; }
            statusDiv.innerText = "ON";
            statusDiv.style.color = "#2ecc71";

            navigator.geolocation.watchPosition(function(pos) {
                const ici = [pos.coords.latitude, pos.coords.longitude];
                const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
                
                speedDiv.innerText = speed;
                userMarker.setLatLng(ici);
                map.panTo(ici);

                // LOGIQUE DE GUIDAGE
                if (speed < 3) {
                    arrowDiv.innerText = "";
                    instrDiv.innerText = "ARRET";
                } else {
                    // Trouver le point du trajet le plus proche
                    let minD = Infinity;
                    let idx = -1;
                    for (let i = 0; i < tracePoints.length; i++) {
                        let d = L.latLng(ici).distanceTo(tracePoints[i]);
                        if (d < minD) { minD = d; idx = i; }
                    }

                    // Regarder 10 points devant (environ 40-50m)
                    if (idx !== -1 && idx < tracePoints.length - 12) {
                        let p_actuel = tracePoints[idx];
                        let p_futur = tracePoints[idx + 6]; 
                        let p_loin = tracePoints[idx + 12];
                        
                        let b_proche = getBearing(p_actuel, p_futur);
                        let b_loin = getBearing(p_futur, p_loin);
                        let diff = b_loin - b_proche;
                        
                        if (diff > 180) diff -= 360;
                        if (diff < -180) diff += 360;

                        if (diff > 25) { 
                            arrowDiv.innerText = ""; 
                            instrDiv.innerText = "DROITE"; 
                        } else if (diff < -25) { 
                            arrowDiv.innerText = ""; 
                            instrDiv.innerText = "GAUCHE"; 
                        } else { 
                            arrowDiv.innerText = ""; 
                            instrDiv.innerText = "TOUT DROIT"; 
                        }
                    }
                }
            }, null, { enableHighAccuracy: true });
        };
    </script>
</body>
</html>
